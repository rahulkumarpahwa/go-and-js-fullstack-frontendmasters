<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go and Js Vanilla FullStack Course</title>
    <link rel="stylesheet" href="./styles.css" />
    <!-- manifest file is for the meta data for the website when someone download it as the app from the browser and also for the PWA(progressive web apps) -->
    <link rel="manifest" href="app.webmanifest" />
    <link rel="icon" href="./images/icon.png" type="image/x-icon" />
    <!-- defer maakes the download of the js file along with parsing the html and they will load together which makes the performance high -->
    <script type="module" src="./app.js" defer></script>
  </head>
  <body>
    <header>
      <h1><img src="./images/logo.svg" height="35" alt="ReelingIt" /></h1>
      <nav>
        <ul>
          <li><a class="navlink" href="/api/movies/top">Movies</a></li>
          <li><a class="navlink" href="">Favorites</a></li>
          <li><a class="navlink" href="">Watchlist</a></li>
          <li><a class="navlink" href="/account">My Account</a></li>
        </ul>
      </nav>
      <div>
        <form onsubmit="app.search(event)">
          <input type="search" placeholder="Search Movies" />
        </form>
      </div>
    </header>
    <main>
      <!-- web component (read slides), more like an react component. -->
      <!-- <loading-wave data-elements="10" data-width="300px" data-height="200px"></loading-wave> -->
      <movie-details-page></movie-details-page>
      <home-page></home-page>
    </main>

    <!-- this template will be parsed by the browser but not rendered. we will use the js to get in the web component.-->
    <template id="template-home">
      <section class="vertical-scroll" id="top-10">
        <h2>This Week's Top Movies!</h2>
        <ul></ul>
      </section>
      <section class="vertical-scroll" id="random">
        <h2>Something to Watch Today!</h2>
        <ul></ul>
      </section>
    </template>

    <!-- template of movie details -->
    <template id="template-movie-details">
      <article id="movie">
        <h2>
          <loading-wave
            elements="2"
            data-width="300px"
            data-height="200px"
          ></loading-wave>
        </h2>
        <h3></h3>
        <header>
          <img src="" alt="Poster" />
          <youtube-embed id="trailer" data-url="">Youtube Loading...!!!</youtube-embed>
          <section id="actions">
            <dl id="metadata"></dl>
            <button>Add to Favorites</button>
            <button>Add to Watchlist</button>
          </section>
        </header>
        <ul id="genres"></ul>
        <p id="overview"></p>
        <ul id="cast"></ul>
      </article>
    </template>

    <footer>
      <p>Copyright &copy; Reeling It 2026-27</p>
    </footer>
  </body>
</html>
